<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="SmartBrain" />
    <!-- black-translucent lets the app draw under the iOS status bar; the shell pads with
         safe-area-inset-top, so content clears the notch. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="preload" href="/fonts/inter-var-latin.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Browser/PWA chrome follows the system theme (was hardcoded dark — light users got a dark
         splash and status bar). An explicit in-app choice can't move these metas, but the system
         default is right for the overwhelming case. -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf8" />
    <title>SmartBrain_3000</title>
    <script>
      // Apply a saved light/dark choice before paint (avoids a flash); "system" = no attr.
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
