# Dependabot — keep dependencies patched without flooding a small maintainer team.
# Each ecosystem opens ONE grouped PR per week (Monday), so a batch of bumps is one
# review, not twenty. Security updates (separate from these version updates) still open
# individually and immediately — enable "Dependabot security updates" in repo settings.
#
# Note: app/requirements.lock is a frozen pip resolution (not a manifest Dependabot edits).
# Dependabot tracks the direct deps in app/pyproject.toml; after merging a Python bump,
# regenerate the lock (pip freeze in the release image) so the pins move with it.
version: 2
updates:
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      web:
        patterns: ["*"]
    # The Vite/SvelteKit dev toolchain is COUPLED — vite, its Svelte plugin, kit, vitest and
    # svelte-check share peer ranges and must move together in one coordinated upgrade (as the
    # manual vite 5->7 bump did). Freezing only `vite` isn't enough: a sibling major jumps the
    # generation and its vite peer can't be satisfied -> npm ERESOLVE (this broke #13, and #16
    # via @sveltejs/vite-plugin-svelte@7 requiring vite 8, and #7). The real gate is node
    # >=20.19 for vite 8; until we bump node and do a coordinated upgrade, freeze every
    # toolchain MAJOR here. Minor/patch bumps still flow; runtime deps (@noble/ed25519,
    # qrcode) are unaffected. Remove an entry when doing the coordinated major upgrade.
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sveltejs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "svelte"
        update-types: ["version-update:semver-major"]
      - dependency-name: "svelte-check"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]

  # Docker base images across every Dockerfile AND docker-compose file in the repo:
  # / (root app image), /signaling (the broker), and /compose (caddy, coturn, wireguard
  # — the operator-run public node's internet-facing images). The docker ecosystem reads
  # both Dockerfiles and compose `image:` refs; unresolvable local/`:latest` tags are
  # skipped automatically.
  - package-ecosystem: docker
    directories:
      - "/"
      - "/signaling"
      - "/compose"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
