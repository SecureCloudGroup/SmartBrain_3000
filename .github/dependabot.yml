# Dependabot — keep dependencies patched without flooding a small maintainer team.
# Each ecosystem opens ONE grouped PR per week (Monday), so a batch of bumps is one
# review, not twenty. Security updates (separate from these version updates) still open
# individually and immediately — enable "Dependabot security updates" in repo settings.
#
# Note: app/requirements.lock is a frozen pip resolution (not a manifest Dependabot edits).
# Dependabot tracks the direct deps in app/pyproject.toml; after merging a Python bump,
# regenerate the lock (pip freeze in the release image) so the pins move with it.
version: 2
updates:
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      web:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
