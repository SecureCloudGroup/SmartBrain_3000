# Dependabot — keep dependencies patched without flooding a small maintainer team.
# Each ecosystem opens ONE grouped PR per week (Monday), so a batch of bumps is one
# review, not twenty. Security updates (separate from these version updates) still open
# individually and immediately — enable "Dependabot security updates" in repo settings.
#
# Note: app/requirements.lock is a frozen pip resolution (not a manifest Dependabot edits).
# Dependabot tracks the direct deps in app/pyproject.toml; after merging a Python bump,
# regenerate the lock (pip freeze in the release image) so the pins move with it.
version: 2
updates:
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      web:
        patterns: ["*"]
    # The Vite/SvelteKit dev toolchain is COUPLED — vite, its Svelte plugin, kit, vitest and
    # svelte-check share peer ranges and must move together in one COORDINATED manual upgrade
    # (as the vite 5->7 and 7->8 bumps did). A lone Dependabot major jumps the generation and
    # its vite peer can't be satisfied -> npm ERESOLVE (this broke #13, #16, #7). This freeze is
    # STANDING policy, not temporary: currently on vite 8 / node 22, it guards the NEXT
    # generation jump (e.g. vite 9) so that too is deliberate. Minor/patch bumps still flow;
    # runtime deps (@noble/ed25519, qrcode) are unaffected. To do the next coordinated upgrade:
    # bump node if the new vite needs it, move the whole set together, rebuild, verify — the
    # freeze then continues to guard the following jump.
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sveltejs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "svelte"
        update-types: ["version-update:semver-major"]
      - dependency-name: "svelte-check"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]

  # Docker base images across every Dockerfile AND docker-compose file in the repo:
  # / (root app image), /signaling (the broker), and /compose (caddy, coturn, wireguard
  # — the operator-run public node's internet-facing images). The docker ecosystem reads
  # both Dockerfiles and compose `image:` refs; unresolvable local/`:latest` tags are
  # skipped automatically.
  - package-ecosystem: docker
    directories:
      - "/"
      - "/signaling"
      - "/compose"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
