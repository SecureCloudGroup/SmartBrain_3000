# Mirror the Bifrost gateway image from Docker Hub into our ghcr namespace.
#
# Why: the install pulled from TWO registries — our app from ghcr, bifrost from Docker Hub. Docker
# Hub anonymously rate-limits (a shared/corporate IP can fail mid-install), and bifrost's `:latest`
# already changed behavior under us once (the startup write-check that broke fresh Linux installs).
# Mirroring gives a single registry and a PINNED tag we bump deliberately.
#
# Run from the Actions tab, or:  gh workflow run mirror-bifrost.yml -f tag=v1.6.4
# `imagetools create` copies the multi-arch manifest registry-to-registry — nothing is pulled locally.
name: Mirror bifrost

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream maximhq/bifrost tag to mirror (e.g. v1.6.4)"
        required: true
        default: "v1.6.4"

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy the multi-arch image
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/securecloudgroup/bifrost:${{ inputs.tag || 'v1.6.4' }} \
            docker.io/maximhq/bifrost:${{ inputs.tag || 'v1.6.4' }}
      - name: Verify
        run: docker buildx imagetools inspect ghcr.io/securecloudgroup/bifrost:${{ inputs.tag || 'v1.6.4' }}
