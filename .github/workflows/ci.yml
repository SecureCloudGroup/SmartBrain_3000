# CI — runs on every PR and on pushes to main. This is the required status check that
# guards `main`: nothing merges unless it is green. Uses the `pull_request` trigger (NOT
# pull_request_target) so a fork's PR runs with a read-only token and NO repo secrets.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: the default token is read-only.
permissions:
  contents: read

# One in-flight run per ref; a new push cancels the stale run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install the app at its pinned versions
        run: |
          python -m pip install --upgrade pip
          # requirements.lock is the exact-pinned resolution used by the release image;
          # apply it as constraints so CI tests the same versions users get.
          pip install -c app/requirements.lock ./app
          pip install pytest ruff
      - name: Ruff
        run: python -m ruff check app/smartbrain_3000 app/tests installer
      - name: Pytest (app + signaling)
        working-directory: app
        run: python -m pytest -q
      - name: Installer tests (hermetic; no Docker)
        run: python -m pytest -q installer/test_install.py

  web:
    name: web (svelte-check + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Type/Svelte check
        working-directory: web
        run: npm run check
      - name: Unit tests
        working-directory: web
        run: npm test
      - name: Build the SPA (smoke)
        working-directory: web
        run: npm run build

  docker-image:
    name: docker image (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build the release image
        # Validates the Dockerfile end-to-end: the base image + `pip install -c
        # requirements.lock` of every pinned (native) dep, on whatever Python the Dockerfile
        # pins. This is the gap the host `backend` job can't see — a base-image or dependency
        # bump that breaks the *shipped* image is caught here, not by users running install.py.
        run: docker build -t smartbrain_3000:ci .
      - name: Ruff + pytest inside the shipped image
        # No mount: exercise the code baked into the image, on the image's own Python.
        run: |
          docker run --rm --entrypoint /bin/sh smartbrain_3000:ci -c '
            pip install --quiet pytest ruff
            cd /app
            python -m ruff check smartbrain_3000
            python -m pytest -q
          '
