# Deploy the PWA shell to the always-on origin (the RTC VPS) on every release.
#
# WHY THIS EXISTS: a phone loads the app SHELL from the public VPS origin (so it opens even while the
# user's Desktop is asleep), then routes /api over WebRTC to the Desktop. That shell is a SEPARATE
# copy from the Desktop's Docker image — so without this job it drifts behind on every release (it
# once sat ~3 weeks stale). The committed `app/smartbrain_3000/web/` at a version tag is exactly the
# shell that release's image serves, so we rsync it to the VPS. The service worker (served no-cache,
# network-first navigation, skipWaiting + clients.claim) then makes phones pick up the new shell on
# next open — no user action.
#
# ONE-TIME SETUP (repo secrets — Settings → Secrets and variables → Actions):
#   RTC_DEPLOY_SSH_KEY  the PRIVATE half of a dedicated ed25519 deploy key
#   RTC_DEPLOY_HOST     rtc.securecloudgroup.com
#   RTC_DEPLOY_USER     the deploy user that owns the web dir
#   RTC_DEPLOY_PATH     absolute path of the served shell dir (…/compose/web)
# and add the deploy key's PUBLIC half to that user's ~/.ssh/authorized_keys on the VPS, ideally
# prefixed `restrict ` (no port/X11/agent forwarding, no pty). See the PR body for the exact commands.
name: Deploy PWA shell

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pwa
  cancel-in-progress: false # never interrupt a half-finished rsync of the LIVE shell

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Refuse to deploy an empty/broken build (it would wipe the live shell)
        run: test -f app/smartbrain_3000/web/index.html && test -d app/smartbrain_3000/web/_app

      - name: Configure the deploy SSH key
        env:
          KEY: ${{ secrets.RTC_DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.RTC_DEPLOY_HOST }}
        run: |
          if [ -z "$KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "::error::RTC_DEPLOY_* secrets are not configured — see this workflow's header."
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync the built shell to the always-on origin
        env:
          DEPLOY_HOST: ${{ secrets.RTC_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.RTC_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.RTC_DEPLOY_PATH }}
        run: |
          rsync -a --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            app/smartbrain_3000/web/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          echo "Deployed shell $(cat app/smartbrain_3000/web/_app/version.json) to $DEPLOY_HOST"
