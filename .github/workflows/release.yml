# Release — build the backend image ONCE, for both CPU architectures, and push it to the GitHub
# Container Registry (ghcr.io). Users then PULL a ready-made image instead of building it locally,
# which is what turns first-run from "20–30 minutes compiling" into "a couple of minutes downloading".
#
# Triggered by pushing a version tag (e.g. `git tag v0.4.0 && git push --tags`), or by hand from the
# Actions tab. Nothing here runs on a normal PR — a fork must never be able to push an image under
# our name (the registry write below is gated on the tag/dispatch, and PRs get a read-only token).
name: Release image

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # manual re-run from the Actions tab (e.g. to re-push :latest)

# Least privilege: read the repo, write packages (the image). Nothing else.
permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never abort a half-finished push — a partial image tag is worse than a wait

jobs:
  image:
    name: build + push (amd64, arm64)
    runs-on: ubuntu-latest
    env:
      # ghcr rejects upper-case names, and github.repository is mixed-case (SecureCloudGroup/…).
      # Pin the lower-cased path once and use it for BOTH the tags and the build cache — the cache
      # refs are hand-written (metadata-action only lower-cases the tags), so they need this too.
      IMAGE: ghcr.io/securecloudgroup/smartbrain_3000
    steps:
      - uses: actions/checkout@v7

      # arm64 is built under emulation on this amd64 runner. It stays fast because every native
      # dependency (duckdb, cryptography, argon2, numpy, uvloop, watchfiles) ships an aarch64 wheel,
      # so `pip install` downloads rather than compiles — QEMU only runs Python, not a C toolchain.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # scoped to this repo, expires with the run — no stored secret

      # Derive the image name + tags. `ghcr.io/<owner>/<repo>` is lower-cased for us here (ghcr
      # rejects upper-case), and a `vMAJOR.MINOR.PATCH` tag yields `1.2.3`, `1.2`, and `latest`.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the registry so a re-tag of the same source is near-instant.
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
