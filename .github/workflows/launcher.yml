# Launcher — build the desktop tray app for macOS and Windows. It has no code signing certificate
# (a deliberate $0 choice): macOS binaries are AD-HOC signed, which is free and is all Apple Silicon
# needs to run, and the app is delivered through Homebrew/winget, which don't apply the quarantine
# flag — so no Gatekeeper/SmartScreen wall. See docs on the install story.
#
# On a PR that touches the launcher, this just proves it still builds on both OSes. On a version tag
# it also attaches the built app to that tag's GitHub Release, ready for Homebrew/winget to point at.
name: Launcher

on:
  pull_request:
    paths:
      - "launcher/**"
      - "compose/docker-compose.release.yml"
      - ".github/workflows/launcher.yml"
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  check:
    name: drift + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Embedded compose must match the canonical one
        # The launcher bakes in a copy of the release compose file. If it drifts from the real one
        # under compose/, users would run a stale stack. Fail loudly rather than ship the mismatch.
        run: diff compose/docker-compose.release.yml launcher/docker-compose.release.yml
      - uses: actions/setup-go@v5
        with:
          go-version-file: launcher/go.mod
      - name: gofmt
        working-directory: launcher
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo 'run gofmt'; exit 1; }
      - name: Vet + test
        working-directory: launcher
        run: |
          go vet ./...
          go test ./stack/...

  macos:
    name: build (macOS universal, ad-hoc signed)
    runs-on: macos-latest
    permissions:
      contents: write # attach the .app to the release on a tag
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: launcher/go.mod
      - name: Build universal binary + bundle SmartBrain.app
        working-directory: launcher
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0-dev' }}
        run: |
          set -eux
          # One binary for both CPU families, so a single download runs on Intel and Apple Silicon.
          GOARCH=arm64 CGO_ENABLED=1 go build -o build/sb-arm64 .
          GOARCH=amd64 CGO_ENABLED=1 go build -o build/sb-amd64 .
          lipo -create -output build/smartbrain build/sb-arm64 build/sb-amd64

          APP=build/SmartBrain.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp build/smartbrain "$APP/Contents/MacOS/SmartBrain"

          # App icon: turn the 512px source into a proper .icns so Finder shows an icon, not a blank
          # sheet. sips upscales the @2x sizes from the 512 source — fine for this flat placeholder.
          mkdir -p icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s icon/icon_app.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
            d=$((s * 2))
            sips -z $d $d icon/icon_app.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/SmartBrain.icns"

          # LSUIElement=1 → menu-bar app, no Dock icon or window. Identifier is our reverse-DNS.
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>SmartBrain</string>
            <key>CFBundleDisplayName</key><string>SmartBrain</string>
            <key>CFBundleIdentifier</key><string>com.securecloudgroup.smartbrain.launcher</string>
            <key>CFBundleExecutable</key><string>SmartBrain</string>
            <key>CFBundleIconFile</key><string>SmartBrain</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION#v}</string>
            <key>LSUIElement</key><true/>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict></plist>
          PLIST
          # Ad-hoc signature (-s -): free, no Apple account, and enough for arm64 to run the app.
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP"
          ditto -c -k --keepParent "$APP" build/SmartBrain-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: SmartBrain-macos
          path: launcher/build/SmartBrain-macos.zip
      - name: Attach to the release (tags only)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes || true
          gh release upload "${{ github.ref_name }}" launcher/build/SmartBrain-macos.zip --clobber

  windows:
    name: build (Windows exe)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: launcher/go.mod
      - name: Build SmartBrain.exe
        working-directory: launcher
        # systray on Windows is pure Go (no CGO), so this is a plain static build.
        run: |
          go build -o build/SmartBrain.exe .
          Compress-Archive -Path build/SmartBrain.exe -DestinationPath build/SmartBrain-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: SmartBrain-windows
          path: launcher/build/SmartBrain-windows.zip
      - name: Attach to the release (tags only)
        if: github.ref_type == 'tag'
        shell: bash # so `|| true` works if the macOS job created the release first
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes || true
          gh release upload "${{ github.ref_name }}" launcher/build/SmartBrain-windows.zip --clobber

  packages:
    name: bump package managers (tags only)
    needs: [macos, windows] # the built zips are what we hash
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the packaging-bump branch
      pull-requests: write # open the housekeeping PR into main
    env:
      # Lifted to a job env so the tap/bucket steps can gate on its presence — the `secrets` context
      # can't be used directly in a step `if:`.
      PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      # Hash the SAME zips that were just published, so the manifests can never point at a stale build.
      - uses: actions/download-artifact@v4
        with: { name: SmartBrain-macos, path: dist }
      - uses: actions/download-artifact@v4
        with: { name: SmartBrain-windows, path: dist }

      - name: Rewrite manifests for this version
        run: |
          python3 packaging/refresh.py --version "${{ github.ref_name }}" \
            --macos dist/SmartBrain-macos.zip --windows dist/SmartBrain-windows.zip

      # The tap and bucket are SEPARATE repos, so the default GITHUB_TOKEN can't reach them. They only
      # update if a PACKAGES_TOKEN secret (a PAT with write to homebrew-tap + scoop-bucket) is set —
      # otherwise these steps are skipped and only the in-repo PR below is opened.
      - name: Push the cask to the Homebrew tap
        if: env.PACKAGES_TOKEN != ''
        run: |
          git clone --depth 1 "https://x-access-token:${PACKAGES_TOKEN}@github.com/SecureCloudGroup/homebrew-tap" tap
          cp packaging/homebrew/Casks/smartbrain.rb tap/Casks/smartbrain.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/smartbrain.rb
          git diff --cached --quiet || git commit -m "SmartBrain ${{ github.ref_name }}"
          git push

      - name: Push the manifest to the Scoop bucket
        if: env.PACKAGES_TOKEN != ''
        run: |
          git clone --depth 1 "https://x-access-token:${PACKAGES_TOKEN}@github.com/SecureCloudGroup/scoop-bucket" bucket
          cp packaging/scoop/smartbrain.json bucket/bucket/smartbrain.json
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/smartbrain.json
          git diff --cached --quiet || git commit -m "SmartBrain ${{ github.ref_name }}"
          git push

      # Submit the winget update to microsoft/winget-pkgs (opens a PR their bot validates + a
      # maintainer merges). komac bases the update on the PREVIOUS version already in winget-pkgs, so
      # this only works once v0.4.0 has merged there — i.e. it kicks in from the next release onward.
      # winget-releaser requires a CLASSIC PAT (public_repo); the same PACKAGES_TOKEN drives it.
      - name: Submit the winget update
        if: env.PACKAGES_TOKEN != ''
        # Non-fatal: until v0.4.0 is merged into winget-pkgs, komac has no prior version to base an
        # update on and this errors — that must NOT fail the release or block the tap/bucket/packaging steps.
        # TODO: drop continue-on-error once v0.4.0 is live in winget, so a real regression can't hide here.
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: SecureCloudGroup.SmartBrain
          installers-regex: 'SmartBrain-windows\.zip$'
          release-tag: ${{ github.ref_name }}
          fork-user: SecureCloudGroup
          token: ${{ secrets.PACKAGES_TOKEN }}

      # Keep packaging/ in the repo honest too — as a PR, because main is branch-protected.
      - name: Open a PR bumping packaging/ in main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet packaging/; then echo "packaging already at this version"; exit 0; fi
          BR="bump-packaging-${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          git add packaging/
          git commit -m "build(packaging): bump manifests to ${{ github.ref_name }}"
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "build(packaging): bump manifests to ${{ github.ref_name }}" \
            --body "Automated: regenerated the cask, winget, and Scoop manifests for ${{ github.ref_name }} from the release assets. This run already updated the live Homebrew tap + Scoop bucket and opened the winget-pkgs PR; this PR just keeps packaging/ in sync."
